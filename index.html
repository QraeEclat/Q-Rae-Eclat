<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Rae Eclat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5e0e5;
            margin: 0;
            padding: 0;
        }
        .hero {
            background-image: url('hero-image.jpg');
            height: 50vh;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }
        .product {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            width: 30%;
            margin: 10px;
        }
        .clock {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
        }
        .contact-form {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Welcome to Q-Rae Eclat</h1>
    </div>

    <div class="clock" id="clock"></div>

    <div class="products">
        <div class="product"><h2>Product 1</h2><p>Description of product 1.</p></div>
        <div class="product"><h2>Product 2</h2><p>Description of product 2.</p></div>
        <div class="product"><h2>Product 3</h2><p>Description of product 3.</p></div>
    </div>

    <div class="contact-form">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br>
            <input type="submit" value="Submit">
        </form>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toUTCString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
