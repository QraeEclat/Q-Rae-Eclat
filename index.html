<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero-section">
        <img src="hero.jpg" alt="Hero Image">
        <h1>Welcome to Our Store!</h1>
    </header>
    <main>
        <section class="products">
            <h2>Product Catalog</h2>
            <ul>
                <li><h3>Product 1</h3><p>Description of Product 1</p></li>
                <li><h3>Product 2</h3><p>Description of Product 2</p></li>
                <li><h3>Product 3</h3><p>Description of Product 3</p></li>
                <li><h3>Product 4</h3><p>Description of Product 4</p></li>
            </ul>
        </section>
        <section class="timezone-clock">
            <h2>Multi-Timezone Clock</h2>
            <div id="clocks">
                <div>
                    <h3>UTC</h3>
                    <p id="utc-time"></p>
                </div>
                <div>
                    <h3>New York</h3>
                    <p id="ny-time"></p>
                </div>
                <div>
                    <h3>London</h3>
                    <p id="london-time"></p>
                </div>
            </div>
        </section>
        <section class="contact">
            <h2>Contact Us</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <script>
        function updateClocks() {
            const now = new Date();
            document.getElementById('utc-time').textContent = now.toUTCString();

            // New York (UTC -4)
            const nyTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            document.getElementById('ny-time').textContent = nyTime.toLocaleTimeString();

            // London (UTC +1)
            const londonTime = new Date(now.toLocaleString('en-GB', { timeZone: 'Europe/London' }));
            document.getElementById('london-time').textContent = londonTime.toLocaleTimeString();
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
    <link rel="stylesheet" href="styles.css">
</body>
</html>
